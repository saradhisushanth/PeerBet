# Render blueprint: all-in-one (client + server). Set DATABASE_URL in dashboard.
services:
  - type: web
    name: peernet
    runtime: node
    buildCommand: |
      npm install
      npm run prisma:generate
      cd server && npm install && npm run build
      cd .. && npm exec prisma migrate deploy
      cd client && npm install && npm run build
    startCommand: npx tsx server/src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
