# Render blueprint: all-in-one (client + server). Set DATABASE_URL in dashboard.
services:
  - type: web
    name: peernet
    runtime: node
    buildCommand: |
      npm install
      npx prisma generate
      cd server && npm install && npm run build
      cd .. && npx prisma migrate deploy
      cd client && npm install && npm run build
    startCommand: node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
